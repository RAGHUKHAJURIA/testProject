name: Infrastructure CI/CD (Terraform)

on:
  push:
    branches:
      - main
    paths:
      - 'testing/terraform/**'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  id-token: write # Required for OIDC authentication with AWS

jobs:
  terraform_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-terraform # Role with Terraform permissions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.x

      - name: Initialize Terraform
        working-directory: ./testing/terraform
        run: ./../scripts/init-terraform.sh

      - name: Terraform Plan
        working-directory: ./testing/terraform
        run: terraform plan -no-color -out=tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: testing/terraform/tfplan

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform_plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production-infra # Requires manual approval if configured in repo settings
      url: 'https://aws.amazon.com/console/' # Link to AWS Console or specific resource
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: testing/terraform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-terraform
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.x

      - name: Initialize Terraform
        working-directory: ./testing/terraform
        run: ./../scripts/init-terraform.sh

      - name: Terraform Apply
        working-directory: ./testing/terraform
        run: terraform apply "tfplan"
