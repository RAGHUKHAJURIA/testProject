name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for OIDC authentication with AWS

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit hooks
        run: |
          pip install pre-commit
          pre-commit install

      - name: Run pre-commit checks
        run: pre-commit run --all-files

  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r testing/requirements.txt

      - name: Run tests
        working-directory: ./testing
        run: ./scripts/run-tests.sh

      - name: Upload test results (e.g., as artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: testing/test-results.xml # Assuming tests generate a JUnit XML report here

  security_scan_code:
    name: Code Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        working-directory: ./testing
        run: bandit -r app/src -f sarif -o bandit-results.sarif || true # Allow failure to not block CI

      - name: Upload Bandit SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: testing/bandit-results.sarif

  build_and_push_docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security_scan_code]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.set-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role # Replace with your OIDC role ARN
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: set-image-tag
        run: |
          IMAGE_TAG="${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: ./testing
        run: ./scripts/build-docker.sh ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.set-image-tag.outputs.image_tag }} ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Push Docker image to ECR
        working-directory: ./testing
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.set-image-tag.outputs.image_tag }}
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Docker Image Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.set-image-tag.outputs.image_tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build_and_push_docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production # Requires manual approval if configured in repo settings
      url: 'https://your-app.example.com' # Replace with your application URL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-eks # Role with EKS access
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get Kubeconfig for EKS
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Deploy application
        working-directory: ./testing
        run: ./scripts/deploy.sh ${{ secrets.ECR_REPOSITORY_URI }}:${{ needs.build_and_push_docker.outputs.image_tag }}
